services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - laravel_net

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_php
    user: "1000:1000"
    volumes:
      - ./src:/var/www
    networks:
      - laravel_net
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_net
    depends_on:
      - php

  node:
    image: node:20-alpine
    container_name: laravel_node
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - laravel_net

volumes:
  pgdata:

networks:
  laravel_net:
    driver: bridge

